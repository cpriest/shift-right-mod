name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and run unit tests
        run: ./gradlew build

      - name: Run in-world game tests (headless server)
        run: ./gradlew runGameTestServer

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: shift-right-jar
          path: build/libs/*.jar

  # Detects adapter drift: fails if the latest AE2 release for our MC version no
  # longer has the method our @Pseudo mixin hooks (in-game the mixin would silently
  # fall back to AE2's native ordering — this makes that visible in CI instead).
  ae2-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Check AE2 quick-move signature
        run: bash ci/check-ae2-contract.sh 1.21.1
