name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and run unit tests
        run: ./gradlew build

      - name: Run in-world game tests (headless server)
        run: ./gradlew runGameTestServer

      - name: Run game tests again with all compat mods loaded (mixin-application + RS behavioral)
        run: ./gradlew runGameTestServer -PdevStorage

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: shift-right-jar
          path: build/libs/*.jar

  # Detects adapter drift across ALL hooked mods (AE2, RS, Sophisticated, MouseTweaks):
  # javap-verifies the classes/methods our @Pseudo mixins select on, both for the
  # pinned dev versions and the latest release of each mod (in-game a mismatch would
  # silently fall back to native ordering — this makes it visible in CI instead).
  compat-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Check pinned versions
        run: bash ci/check-compat-contracts.sh

      - name: Check latest releases (drift radar)
        run: bash ci/check-compat-contracts.sh latest
